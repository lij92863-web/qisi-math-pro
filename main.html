<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇思数学 Pro | 题库架构拆分版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/katex@0.16.8/dist/katex.min.css">
    <script src="https://unpkg.com/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://unpkg.com/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/vue-virtual-scroller@2.0.0-beta.8/dist/vue-virtual-scroller.css">
    <script src="https://unpkg.com/vue-virtual-scroller@2.0.0-beta.8/dist/vue-virtual-scroller.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@0.378.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="./app.css?v=stageC2-recognition-summary-01">
</head>
<body><div id="app"></div>

    <!-- [组件1]: Icon -->
    <template id="icon-tpl">
        <span ref="el" class="inline-flex items-center justify-center shrink-0"></span>
    </template>

    <!-- [组件2]: KaTeX 渲染组件 (核心离线渲染) -->
    <template id="latex-preview-tpl">
        <div :class="['math-content clearfix', $props.class]" v-html="htmlContent"></div>
    </template>

    <!-- [组件3]: 侧边知识树 -->
    <template id="knowledge-tree-tpl">
        <div class="text-[13px] text-gray-700 font-medium select-none">
            <div @click="select(null)" class="flex items-center gap-2 p-2 mb-2 rounded-lg cursor-pointer transition-colors" :class="activeNode === null ? 'bg-blue-50 text-blue-600 font-bold' : 'hover:bg-gray-50'">
                <icon name="layers" size="16"></icon> 全部题库
            </div>
            <div v-for="l1 in treeData" :key="l1.id" class="mb-1">
                <div class="flex items-center gap-1.5 p-1.5 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors" :class="{'bg-blue-50 text-blue-600': activeNode === l1.name}">
                    <button @click.stop="toggle(l1)" class="tree-toggle-btn"><icon :name="l1.expanded ? 'chevron-down' : 'chevron-right'" size="14" class="text-gray-400"></icon></button>
                    <span @click="select(l1.name)" class="flex-1 truncate font-bold text-gray-800" :class="{'text-blue-600': activeNode === l1.name}">{{l1.name}}</span>
                </div>
                <div v-show="l1.expanded" class="pl-2 border-l border-gray-100 ml-2 mt-0.5 flex flex-col gap-0.5">
                    <div v-for="l2 in l1.children" :key="l2.id">
                        <div class="flex items-center gap-1.5 p-1.5 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors text-[12px] font-bold text-gray-600" :class="{'bg-blue-50 text-blue-600': activeNode === l2.name}">
                            <button @click.stop="toggle(l2)" class="tree-toggle-btn"><icon :name="l2.expanded ? 'chevron-down' : 'chevron-right'" size="12" class="text-gray-300"></icon></button>
                            <span @click="select(l2.name)" class="flex-1 truncate">{{l2.name}}</span>
                        </div>
                        <div v-show="l2.expanded" class="pl-4 flex flex-col gap-0.5 mt-0.5">
                            <div v-for="l3 in l2.children" :key="l3.id" @click="select(l3.name)" class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors" :class="{'bg-blue-50 text-blue-600 font-bold': activeNode === l3.name}">
                                <span class="flex-1 truncate text-[11px] text-gray-500 hover:text-blue-600" :class="{'text-blue-600 font-bold': activeNode === l3.name}">{{l3.name}}</span>
                                <span v-if="counts[l3.name]" class="text-[10px] text-gray-400">{{counts[l3.name]}}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- [组件4]: 独立题目卡片 (引入全新高考式排版引擎) -->
    <template id="question-card-tpl">
        <div class="question-card group" :class="{'external-selected': externalMode && checked}" v-if="q && q.id">
            <div class="flex justify-between items-center pb-2 border-b border-gray-100 mb-2 flex-wrap gap-y-1">
                <div class="flex flex-wrap items-center gap-2">
                    <div class="flex items-center gap-1.5 text-[11px] font-bold text-gray-500 bg-gray-50 px-2 py-0.5 rounded-sm">
                        <span class="text-blue-600">{{q?.type || '解答题'}}</span>
                        <span class="text-gray-300">|</span>
                        <span class="text-orange-500">{{q?.meta?.diff || q?.diff || '中等'}}</span>
                        <span class="text-gray-300">|</span>
                        <span>{{q?.meta?.grade || q?.grade || '高一'}}</span>
                    </div>
                    <div v-if="q?.meta?.knowledge || q?.knowledge" class="flex items-center gap-1 text-[10px] font-bold px-1.5 py-0.5 rounded-sm border" :class="(q.meta?.knowledgeType || q.knowledgeType) === 'personal' ? 'text-green-600 bg-green-50 border-green-100' : 'text-blue-600 bg-blue-50 border-blue-100'">
                        <icon name="book-open" size="10"></icon> {{(q.meta?.knowledgeType || q.knowledgeType) === 'personal' ? '个人' : '系统'}}：{{q.meta?.knowledge || q.knowledge}}
                    </div>
                    <span
                        v-if="externalMode && externalStatus"
                        class="material-status-chip"
                        :class="externalStatusClassName"
                        :title="externalStatusTip">
                        {{ externalStatusText }}
                    </span>
                    <span
                        v-if="externalMode && externalProcessText && q.processStatus !== 'unprocessed'"
                        class="external-process-chip">
                        {{ externalProcessText }}
                    </span>
                    <div v-if="(q?.meta?.tags || q?.tags) && (q.meta?.tags || q.tags).length" class="text-[10px] text-gray-400 flex gap-1">
                        <span v-for="tag in (q.meta?.tags || q.tags)" :key="tag" class="border border-gray-100 px-1.5 py-0.5 rounded-sm">#{{tag}}</span>
                    </div>
                </div>
                
                <div v-if="externalMode" class="external-card-right">
                    <label v-if="pickMode" class="external-question-checkbox">
                        <input type="checkbox" :checked="checked" @change="handleTogglePick" />
                        <span></span>
                    </label>
                </div>

                <div v-else class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button @click="toggleEditor" class="px-2 py-0.5 bg-white border border-gray-200 rounded text-[11px] font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-colors flex items-center gap-1">
                        <icon name="edit-3" size="10"></icon> {{ isEditing ? '取消' : '编辑' }}
                    </button>
                    <button @click="handleToggleAnswer" class="px-2 py-0.5 bg-white border border-gray-200 rounded text-[11px] font-bold text-gray-600 hover:bg-gray-50 transition-colors flex items-center gap-1" :disabled="!hasAnswer" :class="{'opacity-50 cursor-not-allowed': !hasAnswer}">
                        <icon :name="showAnswer ? 'eye-off' : 'check-circle'" size="10"></icon> {{ showAnswer ? '隐藏' : '解析' }}
                    </button>
                    <button @click="handleToggleCart" :class="['px-2 py-0.5 border rounded text-[11px] font-bold transition-colors flex items-center gap-1', isSelected ? 'bg-red-50 text-red-600 border-red-200 hover:bg-red-100' : 'bg-[#22a039] text-white border-[#22a039] hover:bg-[#1b802d]']">
                        <icon :name="isSelected ? 'minus' : 'plus'" size="10"></icon> {{ isSelected ? '移出' : '选题' }}
                    </button>
                </div>
            </div>

            <div>
                <!-- 题干 -->
                <latex-preview :content="isEditing && activeEditTab === 'stem' ? editStem : q?.stem" :images="isEditing ? editImages : (q?.images||[])"></latex-preview>
                
                <!-- 【绝赞重构】标准高考试卷排版 -->
                <div v-if="(q?.type === '单选题' || q?.type === '多选题') && q?.options && q.options.some(opt => String(opt || '').trim() !== '') && !isEditing" class="gaokao-options">
                    <div v-for="(opt, idx) in q.options" :key="idx" class="gaokao-option">
                        <span class="option-label">{{String.fromCharCode(65+idx)}}.</span>
                        <span class="option-content">
                            <latex-preview :content="opt" :images="q.images"></latex-preview>
                        </span>
                    </div>
                </div>

                <div v-if="showAnswer && hasAnswer && !isEditing" class="mt-3 pt-2 border-t border-dashed border-gray-200 animate-fade-in bg-gray-50/50 p-2 rounded">
                    <div v-if="q?.answer" class="mb-2">
                        <span class="font-bold text-green-700 text-[12px] block mb-0.5">【参考答案】</span> 
                        <latex-preview :content="q.answer" :images="q.images"></latex-preview>
                    </div>
                    <div v-if="q?.solution" class="mt-2 pt-2 border-t border-gray-200/60">
                        <span class="font-bold text-blue-600 text-[12px] block mb-0.5">【深度解析】</span> 
                        <latex-preview :content="q.solution" :images="q.images"></latex-preview>
                    </div>
                </div>

                <!-- 编辑模式 -->
                <div v-if="isEditing" class="mt-3 p-3 bg-[#fcfcfd] border border-gray-200 rounded shadow-inner animate-fade-in">
                    <div class="grid grid-cols-3 gap-2 mb-3 border-b border-gray-100 pb-3 relative">
                        <select class="input-base text-[11px] py-1" v-model="editType"><option>解答题</option><option>单选题</option><option>多选题</option><option>填空题</option><option>证明题</option></select>
                        <select class="input-base text-[11px] py-1" v-model="editDiff"><option>容易</option><option>中等</option><option>较难</option><option>压轴</option></select>
                        <select class="input-base text-[11px] py-1" v-model="editGrade"><option>初一</option><option>初二</option><option>初三</option><option>高一</option><option>高二</option><option>高三</option></select>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mb-3 border-b border-gray-100 pb-3">
                        <div class="material-field">
                            <label>系统知识点</label>
                            <select v-model="editSystemKnowledge">
                                <option value="">不选择</option>
                                <option v-for="node in flatKnowledge" :key="node.id" :value="node.name">{{ node.path }}</option>
                            </select>
                        </div>
                        <div class="material-field">
                            <label>个人知识点</label>
                            <select v-model="editPersonalKnowledge">
                                <option value="">不选择</option>
                                <option v-for="node in flatPersonalKnowledge" :key="node.id" :value="node.name">{{ node.path }}</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-2">
                        <div class="flex gap-1.5">
                            <button v-for="tab in [{id: 'stem', name: '题干'}, {id: 'answer', name: '答案'}, {id: 'solution', name: '解析'}]" :key="tab.id" @click="activeEditTab = tab.id" :class="['px-2.5 py-0.5 text-[11px] font-bold rounded transition-colors', activeEditTab === tab.id ? 'bg-[#1a73e8] text-white shadow-sm' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-100']">
                                {{tab.name}}
                            </button>
                        </div>
                        <label class="cursor-pointer text-[11px] font-bold text-gray-500 bg-white border border-gray-200 px-2 py-0.5 rounded hover:bg-blue-50 hover:text-blue-600 transition-colors flex items-center gap-1 shadow-sm">
                            <icon name="image-plus" size="12"></icon> 插图 <input type="file" class="hidden" accept="image/*" @change="handleImageUploadEvent" />
                        </label>
                    </div>

                    <textarea
                        class="w-full h-24 p-2 bg-white border border-gray-200 rounded text-[12px] font-mono outline-none focus:border-blue-400 resize-none custom-scrollbar shadow-sm"
                        v-model="currentEditText" @paste="handleEditPaste" placeholder="在此修改 LaTeX 源码..."
                    ></textarea>
                    
                    <div class="mt-3 flex justify-between items-center pt-2 border-t border-gray-200">
                        <button @click="handleDelete" class="text-gray-400 hover:text-red-500 transition-colors flex items-center gap-1 text-[11px] font-bold"><icon name="trash-2" size="12"></icon> 彻底删除</button>
                        <button @click="handleSaveProps" class="text-[11px] text-white bg-[#1a73e8] hover:bg-blue-700 flex items-center gap-1.5 font-bold px-3 py-1 rounded shadow-sm transition-colors">
                            <icon name="save" size="12"></icon> 确认更新
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- [组件5]: 主应用布局 -->
    <template id="app-tpl">
        <div class="app-container">
            <aside class="sidebar">
                <div class="flex items-center gap-3 px-2 mb-8 mt-2">
                    <div class="w-8 h-8 bg-[#1a73e8] rounded-xl flex items-center justify-center text-white shadow-sm">
                        <icon name="brain-circuit" size="18"></icon>
                    </div>
                    <span class="font-bold text-[16px] tracking-tight text-[#1f2937]">奇思数学 Pro</span>
                </div>
                
                <div class="px-3 mb-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest">主控制台</div>
                <nav class="flex-1 space-y-1">
                    <button @click="view = 'entry'" :class="['nav-item', view === 'entry' ? 'active' : 'inactive']"><icon name="plus-circle" size="16"></icon> 新题目录入</button>
                    <button @click="view = 'batchImport'; openBatchList()" :class="['nav-item', view === 'batchImport' ? 'active' : 'inactive']"><icon name="files" size="16"></icon> 批量录题</button>
                    <button @click="view = 'library'" :class="['nav-item', view === 'library' ? 'active' : 'inactive']"><icon name="layout-grid" size="16"></icon> 题库与检索</button>
                    <button @click="openExamBuilder" :class="['nav-item', view === 'exam' ? 'active' : 'inactive']"><icon name="file-text" size="16"></icon> 智能组卷台</button>
                    <button @click="view = 'personal'" :class="['nav-item', view === 'personal' ? 'active' : 'inactive']"><icon name="folder-tree" size="16"></icon> 个人管理</button>
                    <button @click="view = 'template'" :class="['nav-item', view === 'template' ? 'active' : 'inactive']"><icon name="layout-template" size="16"></icon> 极客排版配置</button>
                </nav>
            </aside>

            <main class="main-content custom-scrollbar">
                <!-- ================= 录题视图 ================= -->
                <div v-show="view === 'entry'" class="entry-layout animate-slide-up">
                    <div class="entry-main-card flex-1 bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col relative">
                        <h2 class="text-[17px] font-bold text-gray-800 mb-3 border-b border-gray-100 pb-2">题目录入引擎</h2>
                        
                        <div class="grid grid-cols-2 lg:grid-cols-5 gap-2 mb-3 relative z-20">
                            <div class="flex flex-col gap-1">
                                <label class="text-[10px] font-bold text-gray-500">年级</label>
                                <select class="input-base entry-compact-control custom-select hover:border-gray-300 transition-colors" v-model="entryForm.grade"><option>初一</option><option>初二</option><option>初三</option><option>高一</option><option>高二</option><option>高三</option></select>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-[10px] font-bold text-gray-500">题型</label>
                                <select class="input-base entry-compact-control custom-select hover:border-gray-300 transition-colors" v-model="entryForm.type"><option>解答题</option><option>单选题</option><option>多选题</option><option>填空题</option><option>证明题</option></select>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-[10px] font-bold text-gray-500">难度</label>
                                <select class="input-base entry-compact-control custom-select hover:border-gray-300 transition-colors" v-model="entryForm.diff"><option>容易</option><option>中等</option><option>较难</option><option>压轴</option></select>
                            </div>
                            
                            <!-- 系统知识点级联面板 -->
                            <div class="flex flex-col gap-1 relative">
                                <label class="text-[10px] font-bold text-gray-500">系统知识点</label>
                                <button @click="showEntryKnowledge = !showEntryKnowledge; showEntryPersonalKnowledge = false" class="w-full text-left input-base entry-compact-control hover:border-blue-400 transition-colors flex justify-between items-center bg-white cursor-pointer">
                                    <span class="truncate mr-2 text-[12px] font-medium" :class="entryForm.systemKnowledge ? 'text-blue-600' : 'text-gray-700'">{{ entryForm.systemKnowledge || '选择系统节点' }}</span>
                                    <icon name="chevron-down" size="12" class="text-gray-400 shrink-0"></icon>
                                </button>
                                <div v-if="showEntryKnowledge" @click="showEntryKnowledge = false" class="fixed inset-0 z-40"></div>
                                <div v-if="showEntryKnowledge" class="knowledge-cascader custom-scrollbar right-0 left-auto">
                                    <div class="cascader-col-1 custom-scrollbar">
                                        <div v-for="l1 in knowledgeTree" :key="l1.id" @mouseenter="hoverL1 = l1" @click="selectKnowledge(l1.name, 'system')" class="cascader-l1-item flex justify-between items-center" :class="{'active': hoverL1 && hoverL1.id === l1.id, 'selected': entryForm.systemKnowledge === l1.name}">
                                            <span class="truncate">{{l1.name}}</span>
                                            <icon name="chevron-right" size="12" class="text-gray-400"></icon>
                                        </div>
                                    </div>
                                    <div class="cascader-col-2 custom-scrollbar">
                                        <div v-if="!hoverL1" class="text-center text-gray-400 text-xs mt-10">请在左侧选择一级知识模块</div>
                                        <div v-else>
                                            <div class="text-[14px] font-bold text-gray-800 mb-4 pb-2 border-b border-gray-100">{{hoverL1.name}}</div>
                                            <div v-for="l2 in hoverL1.children" :key="l2.id" class="mb-4">
                                                <button @click="selectKnowledge(l2.name, 'system')" class="cascader-section-title system" :class="{'selected': entryForm.systemKnowledge === l2.name}">{{l2.name}}</button>
                                                <div class="flex flex-wrap gap-2">
                                                    <span v-for="l3 in l2.children" :key="l3.id" @click="selectKnowledge(l3.name, 'system')" class="px-2 py-1.5 bg-gray-50 hover:bg-blue-50 hover:text-blue-600 text-[11px] text-gray-600 rounded cursor-pointer transition-colors" :class="{'bg-blue-500 text-white font-bold': entryForm.systemKnowledge === l3.name}">
                                                        {{l3.name}}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 个人知识点级联面板 -->
                            <div class="flex flex-col gap-1 relative">
                                <label class="text-[10px] font-bold text-gray-500">个人知识点</label>
                                <button @click="showEntryPersonalKnowledge = !showEntryPersonalKnowledge; showEntryKnowledge = false" class="w-full text-left input-base entry-compact-control hover:border-green-400 transition-colors flex justify-between items-center bg-white cursor-pointer">
                                    <span class="truncate mr-2 text-[12px] font-medium" :class="entryForm.personalKnowledge ? 'text-green-600' : 'text-gray-700'">{{ entryForm.personalKnowledge || '选择个人节点' }}</span>
                                    <icon name="chevron-down" size="12" class="text-gray-400 shrink-0"></icon>
                                </button>
                                <div v-if="showEntryPersonalKnowledge" @click="showEntryPersonalKnowledge = false" class="fixed inset-0 z-40"></div>
                                <div v-if="showEntryPersonalKnowledge" class="knowledge-cascader custom-scrollbar right-0 left-auto">
                                    <div class="cascader-col-1 custom-scrollbar">
                                        <div v-if="personalKnowledgeTree.length === 0" class="p-4 text-[12px] text-gray-400">先到个人管理创建知识点</div>
                                        <div v-for="l1 in personalKnowledgeTree" :key="l1.id" @mouseenter="hoverPersonalL1 = l1" @click="selectKnowledge(l1.name, 'personal')" class="cascader-l1-item flex justify-between items-center" :class="{'active': hoverPersonalL1 && hoverPersonalL1.id === l1.id, 'selected': entryForm.personalKnowledge === l1.name}">
                                            <span class="truncate">{{l1.name}}</span>
                                            <icon name="chevron-right" size="12" class="text-gray-400"></icon>
                                        </div>
                                    </div>
                                    <div class="cascader-col-2 custom-scrollbar">
                                        <div v-if="!hoverPersonalL1" class="text-center text-gray-400 text-xs mt-10">请在左侧选择一级分类</div>
                                        <div v-else>
                                            <div class="text-[14px] font-bold text-gray-800 mb-4 pb-2 border-b border-gray-100">{{hoverPersonalL1.name}}</div>
                                            <div v-for="l2 in hoverPersonalL1.children" :key="l2.id" class="mb-4">
                                                <button @click="selectKnowledge(l2.name, 'personal')" class="cascader-section-title personal" :class="{'selected': entryForm.personalKnowledge === l2.name}">{{l2.name}}</button>
                                                <div class="flex flex-wrap gap-2">
                                                    <span v-for="l3 in l2.children" :key="l3.id" @click="selectKnowledge(l3.name, 'personal')" class="px-2 py-1.5 bg-gray-50 hover:bg-green-50 hover:text-green-600 text-[11px] text-gray-600 rounded cursor-pointer transition-colors" :class="{'bg-green-500 text-white font-bold': entryForm.personalKnowledge === l3.name}">
                                                        {{l3.name}}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 极速配图短码框：支持拖拽 -->
                        <div class="mb-3 flex flex-col gap-1 z-10">
                            <label class="text-[10px] font-bold text-gray-500">配图上传 (拖拽/粘贴解析)</label>
                            <div class="drop-zone entry-drop-zone group" @click="$refs.entryImgInput.click()" @dragover.prevent="isDraggingImg=true" @dragleave="isDraggingImg=false" @drop.prevent="handleDrop" :class="{'dragging': isDraggingImg}">
                                <div class="flex flex-col items-center gap-1.5">
                                    <icon name="image" size="18" class="text-gray-300 group-hover:text-blue-400 transition-colors"></icon>
                                    <span class="text-[11px] font-medium text-gray-500">拖拽图片至此框内，或在下方按 <kbd class="bg-white border px-1 rounded shadow-sm text-[10px]">Ctrl+V</kbd> 自动转短码</span>
                                </div>
                                <input type="file" ref="entryImgInput" class="hidden" accept="image/*" @change="handleFileChange" />
                            </div>
                        </div>

                        <!-- 动态生成的图片短码片段 -->

                                    <span class="text-[10px] font-bold">解析中...</span>

                                <div v-else class="text-center text-gray-400">
                                    <icon name="image-plus" size="20" class="mx-auto mb-1 opacity-50"></icon>
                                    <span class="text-[11px] font-medium">点击/拖拽图片识别</span>

                            </div>

                            <div class="flex gap-1.5 mb-2">

                            <textarea class="w-full h-32 p-3 bg-[#fcfcfd] border border-gray-200 rounded-lg text-[11px] font-mono outline-none focus:bg-white focus:border-blue-400 resize-none shadow-inner custom-scrollbar" style="line-height: 1.6;" v-model="ocrDraftStore.rawText" placeholder="识别文本结果..."></textarea>
                        </div>
                        
                        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex-1 flex flex-col min-h-[220px]">

                                完整题面排版预览

                                <template v-if="entryPreviewOptions && entryPreviewOptions.some(opt => String(opt || '').trim() !== '')">
                                    <div class="gaokao-options">

                                            <span class="option-content">

                                            </span>
                                        </div>
                                    </div>
                                </template>

                            </div>
                        </div>

                <!-- ================= 批量录题视图 ================= -->

                            @dragover.prevent="isDraggingBatchFiles = true"
                            @dragleave.prevent="isDraggingBatchFiles = false"
                            @drop.prevent="handleBatchHomeDrop">

                            <strong>点击或拖入 DOCX / PDF / 图片 / 文本</strong>
                            <em>支持试卷文件、答案文件、解析文件、补充图片一起上传</em>

                            </div>
                            <div v-if="recentBatchImportBatches.length === 0" class="batch-empty">

                                <span>还没有批量录题任务</span>

                                    </div>
                                    <div class="batch-job-counts">

                                        <span>已确认 {{ batch.reviewedCount || 0 }}</span>
                                        <span>已入库 {{ batch.submittedCount || 0 }}</span>

                                        <button class="material-light-btn danger" @click="deleteBatchImport(batch.id)">删除</button>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </template>

                    <template v-else-if="batchImportMode === 'create'">

                                <h1>创建批量录题任务</h1>
                                <p>上传试卷、答案或解析文件，后台会自动拆题并生成待审核草稿。</p>

                        </div>

                                    <div v-for="file in batchCreateFiles" :key="file.id" class="batch-file-card">

                                            <span>类型：{{ fileTypeText(file.fileType) }}｜大小：{{ formatFileSize(file.fileSize) }}｜用途：{{ rolesLabel(file) }}</span>
                                            <label v-if="file.fileType === 'pdf'" class="batch-page-range">

                                            </label>
                                            <div v-if="file.fileType === 'pdf' && !validatePageRange(file.pageRange)" class="batch-error">页码范围格式不正确，请参考：1-5，8，10-12。</div>

                                        <div class="batch-file-actions">

                                            <button class="material-light-btn danger" @click="removeBatchCreateFile(file.id)">删除</button>
                                        </div>
                                    </div>

                                            <label>年级<select v-model="batchDefaultMeta.grade"><option value="">请选择年级</option><option>高一</option><option>高二</option><option>高三</option><option>初一</option><option>初二</option><option>初三</option></select></label>
                                            <label>难度<select v-model="batchDefaultMeta.diff"><option value="">请选择难度</option><option>容易</option><option>中等</option><option>较难</option><option>压轴</option></select></label>

                                    <div class="batch-meta-group">

                                                    autocapitalize="off"

            <div v-if="cartPanelAvailable" @click="isCartOpen = true" class="fixed right-0 top-1/2 -translate-y-1/2 bg-[#22a039] text-white w-12 h-14 rounded-l-[12px] shadow-[-4px_0_15px_rgba(34,160,57,0.3)] flex flex-col items-center justify-center cursor-pointer hover:bg-[#1b802d] hover:-translate-x-1 transition-all z-30 group border-y border-l border-white/20" title="打开试卷篮">
                <icon name="shopping-basket" size="20" class="group-hover:scale-110 transition-transform ml-1"></icon>
                <div v-if="cart.length > 0" class="absolute -top-2 -left-2 bg-red-500 text-white text-[10px] font-bold min-w-[20px] px-1 h-5 rounded-full flex items-center justify-center border border-white shadow-sm animate-in zoom-in duration-300">
                    {{cart.length}}
                </div>
            </div>

            <!-- 右侧滑动弹出：试卷篮侧边抽屉 -->
            <div v-if="cartPanelAvailable" v-show="isCartOpen" class="fixed inset-0 bg-black/20 backdrop-blur-[2px] z-40 transition-opacity duration-300" @click="isCartOpen = false"></div>
            
            <div v-if="cartPanelAvailable" class="fixed top-0 right-0 h-full w-[340px] bg-[#f8f9fa] shadow-[-10px_0_40px_rgba(0,0,0,0.1)] z-50 flex flex-col transition-transform duration-300 ease-out border-l border-white/40"
                 :style="{ transform: isCartOpen ? 'translateX(0)' : 'translateX(100%)' }">
                
                <div class="px-4 py-3 bg-white border-b border-gray-100 flex justify-between items-center shrink-0">
                    <h3 class="text-[15px] font-black flex items-center gap-1.5 text-gray-800">
                        <div class="p-1.5 bg-green-100 text-green-600 rounded-lg"><icon name="shopping-basket" size="16"></icon></div> 
                        试卷篮
                        <span class="text-[11px] font-bold text-green-600 bg-green-50 px-1.5 py-0.5 rounded-full border border-green-100 ml-1">{{cart.length}}</span>
                    </h3>
                    <div class="flex items-center gap-1.5">
                        <button v-if="cart.length > 0" @click="clearCart" class="px-2 py-1 text-[11px] font-bold text-red-500 hover:bg-red-50 rounded transition-colors">全部移除</button>
                        <button @click="isCartOpen = false" class="p-1 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded transition-colors">
                            <icon name="x" size="18"></icon>
                        </button>
                    </div>
                </div>
                
                <div class="flex-1 overflow-y-auto p-3 custom-scrollbar relative">
                    <div v-if="cart.length === 0" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
                        <icon name="inbox" size="40" class="mb-2 opacity-20"></icon>
                        <p class="text-[12px] font-medium tracking-widest text-gray-400">尚未添加试题</p>
                    </div>
                    <div v-else class="space-y-2">
                        <div v-for="(q, idx) in cartQuestions" :key="q.id" class="bg-white border border-gray-200 rounded-lg p-2.5 relative group hover:border-red-200 hover:shadow-sm transition-colors">
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-[11px] font-bold text-gray-500 bg-gray-50 px-1.5 py-0.5 rounded">{{idx+1}}. {{q?.type}}</span>
                                <button @click="toggleCart(q.id)" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" title="移除此题">
                                    <icon name="trash-2" size="12"></icon>
                                </button>
                            </div>
                            <div class="text-[12px] text-gray-700 max-h-[50px] overflow-hidden relative">
                                <latex-preview :content="q?.stem" :images="q?.images || []"></latex-preview>
                                <div class="absolute bottom-0 left-0 right-0 h-5 bg-gradient-to-t from-white to-transparent"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-4 bg-white border-t border-gray-100 flex flex-col gap-2 shrink-0">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-gray-500 font-bold text-[12px]">合计：<span class="text-[#22a039] text-[16px] mx-1">{{cart.length}}</span> 题</span>
                    </div>
                    <button @click="openExamBuilder" class="w-full py-2 bg-[#22a039] text-white rounded-lg text-[13px] font-bold shadow-md shadow-green-200 hover:bg-[#1b802d] transition-all flex items-center justify-center gap-1.5">
                        前往排版 <icon name="arrow-right" size="14"></icon>
                    </button>
                </div>
            </div>
        </div>
    </template>
